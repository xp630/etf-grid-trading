<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETF网格交易监控</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; color: #00d4ff; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: #16213e; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .card h2 { font-size: 16px; color: #888; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .stat { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #222; }
        .stat:last-child { border-bottom: none; }
        .stat-label { color: #888; }
        .stat-value { font-weight: bold; }
        .positive { color: #00ff88; }
        .negative { color: #ff4444; }
        .warning { color: #ffaa00; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #333; }
        th { color: #888; font-weight: normal; }
        .buy { color: #00ff88; }
        .sell { color: #ff4444; }
        .price-display { font-size: 36px; font-weight: bold; text-align: center; padding: 20px; color: #00d4ff; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .status-safe { background: #00ff8820; color: #00ff88; }
        .status-warning { background: #ffaa0020; color: #ffaa00; }
        .status-danger { background: #ff444420; color: #ff4444; }

        .tabs { display: flex; gap: 5px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .tab-btn { background: #16213e; border: none; color: #888; padding: 10px 20px; border-radius: 8px 8px 0 0; cursor: pointer; font-size: 14px; transition: all 0.3s; }
        .tab-btn:hover { background: #1a1a2e; color: #eee; }
        .tab-btn.active { background: #00d4ff; color: #1a1a2e; font-weight: bold; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .grid-viz { background: #16213e; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .grid-viz h2 { font-size: 16px; color: #888; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .grid-bar { display: flex; align-items: center; margin: 10px 0; font-size: 12px; }
        .grid-bar .level-info { width: 80px; color: #888; }
        .grid-bar .bar-container { flex: 1; height: 24px; background: #1a1a2e; border-radius: 4px; position: relative; overflow: hidden; }
        .grid-bar .level-marker { position: absolute; top: 0; bottom: 0; width: 4px; background: #444; }
        .grid-bar .position-dot { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 16px; height: 16px; border-radius: 50%; background: #00d4ff; border: 2px solid #fff; z-index: 2; }
        .grid-bar .price-label { width: 60px; text-align: right; color: #00d4ff; font-weight: bold; }
        .grid-bar.current { background: #00d4ff20; border-radius: 8px; padding: 5px 10px; margin: 5px 0; }
        .grid-bar.buy-level { background: #00ff8820; border-radius: 8px; padding: 5px 10px; margin: 5px 0; }
        .grid-bar.sell-level { background: #ff444420; border-radius: 8px; padding: 5px 10px; margin: 5px 0; }
        .grid-legend { display: flex; gap: 20px; margin-top: 15px; font-size: 12px; color: #888; }
        .grid-legend span { display: flex; align-items: center; gap: 5px; }
        .grid-legend .dot { width: 10px; height: 10px; border-radius: 50%; }
        .export-btn { background: #333; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .export-btn:hover { background: #444; }
        .refresh { position: fixed; bottom: 20px; right: 20px; background: #00d4ff; color: #1a1a2e; border: none; padding: 15px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 15px rgba(0,212,255,0.3); }
        .refresh:hover { background: #00b8d4; }

        .data-notice { background: #ffaa0020; border: 1px solid #ffaa00; border-radius: 8px; padding: 10px 20px; margin-bottom: 20px; text-align: center; color: #ffaa00; font-size: 14px; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #888; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #333; border-radius: 6px; background: #1a1a2e; color: #fff; }
        .form-group input:focus { outline: none; border-color: #00d4ff; }
        .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .modal-buttons button { padding: 10px 20px; border-radius: 6px; cursor: pointer; border: none; }
        .btn-save { background: #00d4ff; color: #1a1a2e; }
        .notification-status { display: flex; align-items: center; gap: 10px; margin-top: 10px; padding: 10px; background: #1a1a2e; border-radius: 6px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; }
        .status-dot.enabled { background: #00ff88; }
        .status-dot.disabled { background: #ff4444; }
        .password-toggle { position: relative; }
        .password-toggle input { padding-right: 40px; }
        .password-toggle .toggle-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #888; cursor: pointer; }

        .log-viewer { background: #0d0d0d; border-radius: 8px; padding: 15px; margin-top: 20px; max-height: 300px; overflow-y: auto; font-family: 'Consolas', monospace; font-size: 11px; line-height: 1.6; }
        .log-line { padding: 2px 0; border-bottom: 1px solid #1a1a1a; }
        .log-line:last-child { border-bottom: none; }
        .log-time { color: #888; }
        .log-info { color: #00d4ff; }
        .log-warn { color: #ffaa00; }
        .log-error { color: #ff4444; }
        .log-refresh { float: right; background: #333; border: none; color: #fff; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .log-refresh:hover { background: #444; }
        .log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .log-header h3 { color: #888; font-size: 14px; margin: 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 ETF网格交易监控</h1>

        <div class="tabs">
            <button class="tab-btn active" id="btn-dashboard" onclick="showTab('dashboard')">📊 监控面板</button>
            <button class="tab-btn" id="btn-settings" onclick="showTab('settings')">⚙️ 设置</button>
            <button class="tab-btn" id="btn-logs" onclick="showTab('logs')">📋 日志</button>
        </div>

        <!-- 监控面板 -->
        <div id="tab-dashboard" class="tab-content active">
            <div class="data-notice" id="data-notice" style="display:none;">
                数据来源: <span id="data-source"></span> | 数据日期: <span id="data-date"></span> | 模拟交易模式
            </div>

            <div class="grid-viz" id="grid-viz" style="display:none;">
                <h2>网格状态 <button class="export-btn" onclick="exportTrades()">📥 导出交易记录</button></h2>
                <div id="grid-container"></div>
                <div class="grid-legend">
                    <span><div class="dot" style="background:#00d4ff"></div> 当前价格</span>
                    <span><div class="dot" style="background:#00ff88"></div> 买入档位(有持仓)</span>
                    <span><div class="dot" style="background:#ff4444"></div> 卖出档位(有持仓)</span>
                    <span><div class="dot" style="background:#444"></div> 无持仓档位</span>
                </div>
            </div>

            <div class="grid">
                <div class="card">
                    <h2>当前行情</h2>
                    <div class="price-display" id="current-price">--</div>
                    <div class="stat">
                        <span class="stat-label">ETF代码</span>
                        <span class="stat-value" id="etf-code">510300</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">市场状态</span>
                        <span class="stat-value" id="market-status">--</span>
                    </div>
                </div>

                <div class="card">
                    <h2>账户概览</h2>
                    <div class="stat">
                        <span class="stat-label">总资产</span>
                        <span class="stat-value" id="total-assets">--</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">持仓市值</span>
                        <span class="stat-value" id="position-value">--</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">可用资金</span>
                        <span class="stat-value" id="cash">--</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">今日盈亏</span>
                        <span class="stat-value" id="daily-pnl">--</span>
                    </div>
                </div>

                <div class="card">
                    <h2>风控状态</h2>
                    <div class="stat">
                        <span class="stat-label">日亏损限额</span>
                        <span class="stat-value" id="daily-limit">--</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">日亏损剩余</span>
                        <span class="stat-value" id="daily-remaining">--</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">止损线</span>
                        <span class="stat-value" id="stop-loss">--</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">状态</span>
                        <span class="stat-value" id="risk-status">--</span>
                    </div>
                </div>

                <div class="card">
                    <h2>当前持仓</h2>
                    <table id="positions-table">
                        <thead>
                            <tr>
                                <th>标的</th>
                                <th>数量</th>
                                <th>成本</th>
                                <th>当前价</th>
                                <th>盈亏</th>
                            </tr>
                        </thead>
                        <tbody id="positions-body">
                            <tr><td colspan="5" style="text-align:center;color:#888">暂无持仓</td></tr>
                        </tbody>
                    </table>
                </div>

                <div class="card" style="grid-column: span 2;">
                    <h2>最近交易</h2>
                    <table id="trades-table">
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>标的</th>
                                <th>操作</th>
                                <th>价格</th>
                                <th>数量</th>
                                <th>金额</th>
                            </tr>
                        </thead>
                        <tbody id="trades-body">
                            <tr><td colspan="6" style="text-align:center;color:#888">暂无交易记录</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 设置 -->
        <div id="tab-settings" class="tab-content">
            <div class="card">
                <h2>⚙️ 系统设置</h2>

                <h3 style="color:#888;margin:15px 0 10px;font-size:14px;">通知设置</h3>
                <div class="form-group">
                    <label>Server酱 SCKEY</label>
                    <input type="text" id="setting-serverkey" placeholder="输入Server酱SCKEY">
                </div>
                <div class="notification-status">
                    <div class="status-dot disabled" id="notify-status-dot"></div>
                    <span id="notify-status-text">未配置</span>
                </div>

                <h3 style="color:#888;margin:15px 0 10px;font-size:14px;">聚宽账号</h3>
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="setting-jq-username" placeholder="聚宽用户名">
                    <div class="notification-status">
                        <div class="status-dot disabled" id="jq-status-dot"></div>
                        <span id="jq-status-text">未配置</span>
                    </div>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <div class="password-toggle">
                        <input type="password" id="setting-jq-password" placeholder="聚宽密码">
                        <button type="button" class="toggle-btn" onclick="togglePassword()">👁️</button>
                    </div>
                </div>

                <div class="modal-buttons">
                    <button class="btn-save" onclick="saveSettings()">保存设置</button>
                </div>
            </div>
        </div>

        <!-- 日志 -->
        <div id="tab-logs" class="tab-content">
            <div class="card">
                <div class="log-header">
                    <h3>📋 系统日志</h3>
                    <button class="log-refresh" onclick="refreshLogs()">🔄 刷新</button>
                </div>
                <div class="log-viewer" id="log-viewer">
                    <div style="color:#888;text-align:center;">加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <button class="refresh" onclick="refreshData()">🔄 刷新</button>

    <script>
        let currentPrice = 0;

        function showTab(name) {
            document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(e => e.classList.remove('active'));
            document.getElementById('tab-' + name).classList.add('active');
            document.getElementById('btn-' + name).classList.add('active');
            if (name === 'settings') loadSettings();
            if (name === 'logs') refreshLogs();
        }

        async function refreshData() {
            try {
                const resp = await fetch('/api/status');
                const json = await resp.json();
                if (!json.success) return;
                const data = json.data;
                currentPrice = data.current_price;

                if (data.data_info) {
                    const notice = document.getElementById('data-notice');
                    if (data.data_info.is_historical) {
                        notice.style.display = 'block';
                        notice.classList.remove('mock');
                        document.getElementById('data-source').textContent = data.data_info.data_source;
                        document.getElementById('data-date').textContent = data.data_info.data_date;
                    }
                }

                document.getElementById('current-price').textContent = data.current_price ? `¥${data.current_price.toFixed(3)}` : '--';
                document.getElementById('total-assets').textContent = `¥${data.total_assets.toFixed(2)}`;
                document.getElementById('position-value').textContent = `¥${data.position_value.toFixed(2)}`;
                document.getElementById('cash').textContent = `¥${data.cash.toFixed(2)}`;
                const pnlEl = document.getElementById('daily-pnl');
                pnlEl.textContent = `¥${data.daily_pnl.toFixed(2)}`;
                pnlEl.className = 'stat-value ' + (data.daily_pnl >= 0 ? 'positive' : 'negative');

                const risk = data.risk_status;
                document.getElementById('daily-limit').textContent = `¥${risk.daily_limit}`;
                document.getElementById('daily-remaining').textContent = `¥${risk.daily_remaining.toFixed(2)}`;
                document.getElementById('stop-loss').textContent = `¥${risk.stop_loss_line}`;
                const riskStatusEl = document.getElementById('risk-status');
                if (risk.daily_remaining < 0) {
                    riskStatusEl.innerHTML = '<span class="status-badge status-danger">触及止损</span>';
                } else if (risk.daily_remaining < 20) {
                    riskStatusEl.innerHTML = '<span class="status-badge status-warning">接近限额</span>';
                } else {
                    riskStatusEl.innerHTML = '<span class="status-badge status-safe">正常</span>';
                }

                updatePositions(data.positions, data.current_price);
                updateTrades(data.recent_trades);
            } catch (err) { console.error('Refresh error:', err); }
        }

        function updatePositions(positions, currentPrice) {
            const tbody = document.getElementById('positions-body');
            if (!positions || positions.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#888">暂无持仓</td></tr>';
                return;
            }
            tbody.innerHTML = positions.map(p => {
                const pnl = p.pnl;
                const pnlClass = pnl >= 0 ? 'positive' : 'negative';
                return `<tr><td>${p.symbol}</td><td>${p.quantity}</td><td>¥${p.avg_price.toFixed(3)}</td><td>¥${currentPrice.toFixed(3)}</td><td class="${pnlClass}">¥${pnl.toFixed(2)}</td></tr>`;
            }).join('');
        }

        function updateTrades(trades) {
            const tbody = document.getElementById('trades-body');
            if (!trades || trades.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#888">暂无交易记录</td></tr>';
                return;
            }
            tbody.innerHTML = trades.map(t => {
                const actionClass = t.action === 'buy' ? 'buy' : 'sell';
                const actionText = t.action === 'buy' ? '买入' : '卖出';
                return `<tr><td>${t.timestamp.split('T')[0]}</td><td>${t.symbol}</td><td class="${actionClass}">${actionText}</td><td>¥${t.price.toFixed(3)}</td><td>${t.quantity}</td><td>¥${(t.price * t.quantity).toFixed(2)}</td></tr>`;
            }).join('');
        }

        async function refreshGrid() {
            try {
                const resp = await fetch('/api/grid/status');
                const json = await resp.json();
                if (!json.success) return;
                const data = json.data;
                const container = document.getElementById('grid-container');
                const gridViz = document.getElementById('grid-viz');
                gridViz.style.display = 'block';
                let html = '';
                const levels = data.levels;
                for (let i = levels.length - 1; i >= 0; i--) {
                    const level = levels[i];
                    let className = 'grid-bar';
                    if (level.is_current) className += ' current';
                    else if (level.has_position) className += level.is_below ? ' buy-level' : ' sell-level';
                    const badge = level.is_current ? '◀' : (level.has_position ? (level.is_below ? '📈' : '📉') : '');
                    const position = ((i / (levels.length - 1)) * 100).toFixed(1);
                    html += `<div class="${className}">
                        <span class="level-info">${badge} 第${level.index + 1}档</span>
                        <div class="bar-container">
                            <div class="level-marker" style="left:${position}%"></div>
                            ${level.is_current ? '<div class="position-dot" style="left:' + position + '%"></div>' : ''}
                        </div>
                        <span class="price-label">¥${level.price.toFixed(3)}</span>
                    </div>`;
                }
                container.innerHTML = html;
            } catch (err) { console.error('Grid refresh error:', err); }
        }

        function exportTrades() { window.location.href = '/api/trades/export'; }

        function loadSettings() {
            fetch('/api/config').then(r => r.json()).then(json => {
                if (!json.success) return;
                const notif = json.data.notification || {};
                const serverkeyInput = document.getElementById('setting-serverkey');
                if (serverkeyInput) serverkeyInput.value = notif['server酱_key'] || '';
                const statusDot = document.getElementById('notify-status-dot');
                const statusText = document.getElementById('notify-status-text');
                if (statusDot && statusText) {
                    if (notif['server酱_key']) {
                        statusDot.className = 'status-dot enabled';
                        statusText.textContent = '已配置';
                    } else {
                        statusDot.className = 'status-dot disabled';
                        statusText.textContent = '未配置';
                    }
                }
                const creds = json.data.credentials || {};
                const jqStatusDot = document.getElementById('jq-status-dot');
                const jqStatusText = document.getElementById('jq-status-text');
                if (jqStatusDot && jqStatusText) {
                    if (creds.username) {
                        jqStatusDot.className = 'status-dot enabled';
                        jqStatusText.textContent = '已配置: ' + creds.username;
                    } else {
                        jqStatusDot.className = 'status-dot disabled';
                        jqStatusText.textContent = '未配置';
                    }
                }
            }).catch(err => console.error('loadSettings error:', err));
        }

        async function saveSettings() {
            const serverkey = document.getElementById('setting-serverkey').value.trim();
            const jqUsername = document.getElementById('setting-jq-username').value.trim();
            const jqPassword = document.getElementById('setting-jq-password').value;
            try {
                await fetch('/api/config/notification', {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({'server酱_key': serverkey})
                });
                if (jqUsername || jqPassword) {
                    await fetch('/api/config/credentials', {
                        method: 'PUT',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({'username': jqUsername, 'password': jqPassword})
                    });
                }
                alert('设置已保存');
                loadSettings();
            } catch (err) { alert('保存失败: ' + err); }
        }

        function togglePassword() {
            const pwd = document.getElementById('setting-jq-password');
            pwd.type = pwd.type === 'password' ? 'text' : 'password';
        }

        async function refreshLogs() {
            try {
                const resp = await fetch('/api/logs?lines=50');
                const json = await resp.json();
                const container = document.getElementById('log-viewer');
                if (!container) return;
                if (!json.success || !json.data.lines.length) {
                    container.innerHTML = '<div style="color:#888;text-align:center;">暂无日志</div>';
                    return;
                }
                container.innerHTML = json.data.lines.map(line => {
                    let logClass = 'log-info';
                    if (line.includes('ERROR')) logClass = 'log-error';
                    else if (line.includes('WARNING') || line.includes('警告')) logClass = 'log-warn';
                    const timeMatch = line.match(/^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}/);
                    const timeStr = timeMatch ? timeMatch[0] : '';
                    const rest = line.replace(timeStr, '').trim();
                    return `<div class="log-line"><span class="log-time">${timeStr}</span><span class="${logClass}">${rest}</span></div>`;
                }).join('');
                container.scrollTop = container.scrollHeight;
            } catch (err) {
                const container = document.getElementById('log-viewer');
                if (container) container.innerHTML = '<div style="color:#ff4444;">加载失败: ' + err + '</div>';
            }
        }

        refreshData();
        refreshGrid();
        setInterval(() => {
            if (document.getElementById('tab-dashboard').classList.contains('active')) {
                refreshData();
                refreshGrid();
            }
        }, 10000);
    </script>
</body>
</html>
